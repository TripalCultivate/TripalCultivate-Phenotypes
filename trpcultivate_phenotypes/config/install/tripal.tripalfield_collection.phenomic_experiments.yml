id: 'phenomic_experiments'
label: 'Phenomic Experiment and Sample Content Types (Chado)'
description: 'Provide pages describing phenomic experiments (e.g. field, biochemical and survey) and constituent samples.'
fields:

## Field Phenomic Experiment ##
## Chado Table: project
## Required Columns: name (varchar 255)
## Optional columns: description (text)
## Related: projectprop, project_pub, project_relationship
##          array_project, nd_experiment_project, project_analysis, project_contact, project_dbxref, project_feature, project_stock
    -   name: experiment_name
        content_type: field_experiment
        label: Name
        type: chado_string_type
        description: The name of the item.
        cardinality: 1
        required: true
        storage_settings:
            storage_plugin_id: chado_storage
            storage_plugin_settings:
                base_table: project
                base_column: name
            max_length: 255
        settings:
            termIdSpace: schema
            termAccession: name
        display:
          view:
            default:
              region: content
